# parameters will get updated with sweeps
parameters:
  
  # Net Parameters
  model_name: 'GenevaNOT'
  n_experts: 1
  n_head: 2
  n_layers: 3
  n_hidden: 32
  attn_dropout: 0.3
  attn_type: flash

  # Training Parameters
  optimizer: adam
  scheduler: cycle
  epochs: 1000
  learning_rate: 0.005
  batch_size: 4
  loss_function: LPloss
  data_weighting: 50
  pde_loss_weight: 5.656854248
  seed: 42

  # Cyclic Learning rate args
  init_lr: 0.001
  div_factor: 20
  pct_start: 0.05
  final_div_factor: 10000

dataset_settings:
  name: Cylinder_2D
  openFOAM_case_dir: ./tests/case_files/cylinder/case.foam
  dataset_dir: ./tests/datasets/cylinder_2026_v3.npy

  # Model-Data Specific
  input_dim: 2
  branch_sizes: [1]
  space_dim: 2
  output_dim: 3

  # Training
  data_split: 0.75
  